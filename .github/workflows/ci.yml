name: CI

on:
  push:
    paths-ignore:
      - 'docs/**'
      - 'work_logs/**'
      - '.agent/**'
      - 'README.md'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'work_logs/**'
      - '.agent/**'
      - 'README.md'
      - '**/*.md'

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
